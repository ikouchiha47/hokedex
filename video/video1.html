<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
#stage-wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #111; overflow: hidden; }
#stage { width: 1080px; height: 1920px; flex-shrink: 0; position: relative; overflow: hidden; }

:root {
  --purple: #7c3aed;
  --purple-bright: #9d5cff;
  --black: #0a0a0a;
  --white: #ffffff;
  --muted: #6b7280;
}

body {
  width: 1080px;
  height: 1920px;
  background: var(--black);
  overflow: hidden;
  font-family: 'Space Grotesk', sans-serif;
  color: var(--white);
}

/* All scenes absolutely stacked */
.scene {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  visibility: hidden;
  opacity: 0;
}

/* ── SCENE 1 & 2: Big text ── */
.hero {
  flex-direction: column;
  text-align: center;
  padding: 0 80px;
}

.big-line {
  font-weight: 800;
  font-size: 168px;
  line-height: 0.9;
  letter-spacing: -6px;
  color: var(--white);
  display: block;
}

.big-line .accent { color: var(--purple-bright); }

/* ── SCENE 3: Roster screen ── */
.screen-frame {
  width: 1080px;
  height: 1920px;
  position: relative;
  overflow: hidden;
}

.screen-frame img {
  width: 1080px;
  height: auto;
  display: block;
  position: absolute;
  top: 0;
  left: 0;
}


/* ── SCENE 4: Type chips ── */
.chips-scene {
  flex-direction: column;
  gap: 36px;
  padding: 0 80px;
  align-items: center;
}

.chip-row {
  display: flex;
  gap: 24px;
  justify-content: center;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 40px;
  border-radius: 100px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 40px;
  border: 2.5px solid;
  white-space: nowrap;
  background: rgba(255,255,255,0.04);
  line-height: 1;
}

.chip-red    { color: #ef4444; border-color: #ef4444; }
.chip-purple { color: #a78bfa; border-color: #a78bfa; }
.chip-yellow { color: #facc15; border-color: #facc15; }
.chip-green  { color: #4ade80; border-color: #4ade80; }
.chip-orange { color: #fb923c; border-color: #fb923c; }
.chip-grey   { color: #9ca3af; border-color: #9ca3af; }
.chip-pink   { color: #f472b6; border-color: #f472b6; }
.chip-teal   { color: #2dd4bf; border-color: #2dd4bf; }

/* ── SCENE 6: Insights overlay text ── */
.insights-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 120px 80px 160px;
  background: linear-gradient(to top, rgba(10,10,10,1) 0%, rgba(10,10,10,0.85) 60%, rgba(10,10,10,0) 100%);
}

.overlay-text {
  font-weight: 800;
  font-size: 96px;
  line-height: 1.0;
  letter-spacing: -3px;
  color: var(--white);
}

.overlay-text .accent { color: var(--purple-bright); }

/* ── SCENE 7: Lock-up ── */
.lockup {
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 40px;
}

.lockup-logo {
  font-weight: 800;
  font-size: 148px;
  letter-spacing: -5px;
  line-height: 1;
}

.lockup-logo .e { color: var(--purple-bright); }

.lockup-tagline {
  font-size: 48px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.lockup-pills {
  display: flex;
  gap: 20px;
  margin-top: 8px;
}

.pill {
  padding: 16px 36px;
  border-radius: 100px;
  font-size: 34px;
  font-weight: 600;
  border: 2px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.6);
}

/* purple glow pulse on lock-up logo */
@keyframes glow {
  0%, 100% { text-shadow: 0 0 40px rgba(124,58,237,0.3); }
  50%       { text-shadow: 0 0 80px rgba(124,58,237,0.7), 0 0 120px rgba(124,58,237,0.3); }
}
.lockup-logo { animation: glow 2s ease-in-out infinite; }

/* ── Preview controls ── */
#preview-controls {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(0,0,0,0.85);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 12px 20px;
  border-radius: 100px;
  z-index: 9999;
  backdrop-filter: blur(10px);
}
#preview-controls button {
  background: #7c3aed;
  color: #fff;
  border: none;
  padding: 8px 20px;
  border-radius: 100px;
  font-size: 15px;
  font-family: sans-serif;
  cursor: pointer;
  font-weight: 600;
}
#preview-controls input[type=range] {
  width: 220px;
  accent-color: #7c3aed;
  cursor: pointer;
}
#preview-time {
  color: #fff;
  font-family: monospace;
  font-size: 13px;
  min-width: 48px;
}
</style>
</head>
<body>
<div id="stage-wrap">
  <div id="stage">

<!-- S1: "I made a Pokédex." -->
<div class="scene" id="s1">
  <div class="hero">
    <span class="big-line" id="s1a">I made a</span>
    <span class="big-line" id="s1b">Pokédex.</span>
  </div>
</div>

<!-- S2: "for people I date." -->
<div class="scene" id="s2">
  <div class="hero">
    <span class="big-line" id="s2a">for people</span>
    <span class="big-line" id="s2b">I <span class="accent">date.</span></span>
  </div>
</div>

<!-- S3: Roster screen -->
<div class="scene" id="s3">
  <div class="screen-frame">
    <img src="assets/seed_landing.png" alt="roster">
  </div>
</div>

<!-- S4: Type chips -->
<div class="scene chips-scene" id="s4">
  <div class="chip-row">
    <span class="chip chip-red"    id="c1">🚩 Red Flag</span>
    <span class="chip chip-purple" id="c2">👻 Ghost Type</span>
  </div>
  <div class="chip-row">
    <span class="chip chip-yellow" id="c3">💛 Situationship</span>
    <span class="chip chip-green"  id="c4">☣️ Toxic</span>
  </div>
  <div class="chip-row">
    <span class="chip chip-orange" id="c5">🔥 Hot Mess</span>
    <span class="chip chip-grey"   id="c6">🤖 NPC</span>
  </div>
  <div class="chip-row">
    <span class="chip chip-pink"   id="c7">🎭 Main Character</span>
    <span class="chip chip-teal"   id="c8">🃏 Wild Card</span>
  </div>
</div>

<!-- S5: Profile screen + Red Flag sonar ping
     Stage coords: pill center at x=540, y=710
     Pill size: ~560×100px (rounded to pill shape)
     Rings: same shape, start at scale 1, fly out to 2.5+ fading to 0 -->
<div class="scene" id="s5">
  <div class="screen-frame">
    <img src="assets/profile.png" alt="profile">
    <!-- pill: centered at x=540, y=710 → left=(540-280)=260, top=(710-50)=660 -->
    <div id="s5-flag" style="
      position:absolute; left:260px; top:660px;
      width:560px; height:100px;
      display:flex; align-items:center; justify-content:center;
      gap:16px;
      border-radius:100px;
      font-family:'Space Grotesk',sans-serif;
      font-weight:800; font-size:56px;
      color:#ef4444;
      border:5px solid #ef4444;
      background:rgba(10,10,10,0.92);
      white-space:nowrap;
      opacity:0; visibility:visible;
    ">🚩 Red Flag</div>
    <!-- sonar rings: same box as pill, scale outward and fade -->
    <div class="s5-ring" style="position:absolute;left:260px;top:660px;width:560px;height:100px;border-radius:100px;border:4px solid rgba(239,68,68,0.7);opacity:0;visibility:visible;"></div>
    <div class="s5-ring" style="position:absolute;left:260px;top:660px;width:560px;height:100px;border-radius:100px;border:4px solid rgba(239,68,68,0.5);opacity:0;visibility:visible;"></div>
  </div>
</div>

<!-- S6: Insights screen + overlay text -->
<div class="scene" id="s6">
  <div class="screen-frame">
    <img src="assets/insights.png" alt="insights">
    <!-- insight list names test_Eve etc: y≈1120-1900 in 2292 original → all in lower half of frame -->
    <!-- blur the name column (left portion of each row) - simpler: blur left 55% of lower section -->
    <div style="
      position:absolute; top:58%; left:0; width:55%; height:38%;
      backdrop-filter: blur(14px) brightness(0.9);
      -webkit-backdrop-filter: blur(14px) brightness(0.9);
      pointer-events:none;
    "></div>
    <div class="insights-overlay" id="s6-text">
      <div class="overlay-text">The patterns<br/>were <span class="accent">always</span><br/>there.</div>
    </div>
  </div>
</div>

<!-- S7: Lock-up -->
<div class="scene lockup" id="s7">
  <div class="lockup-logo">hok<span class="e">é</span>dex</div>
  <div class="lockup-tagline">gotta hook 'em all</div>
  <div class="lockup-pills">
    <span class="pill">Free</span>
    <span class="pill">Android</span>
    <span class="pill">No account</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
window.timelineReady = false;

const show = id => gsap.set('#' + id, { autoAlpha: 1 });

const tl = gsap.timeline({ paused: true });

// ── S1: "I made a Pokédex."  0 – 2.5s ──
tl
  .add(() => show('s1'))
  .from('#s1a', { y: 120, opacity: 0, duration: 0.28, ease: 'power4.out' })
  .from('#s1b', { y: 120, opacity: 0, duration: 0.28, ease: 'power4.out' }, '-=0.1')
  .to('#s1', { autoAlpha: 0, duration: 0.2 }, '+=1.6')

// ── S2: "for people I date."  2.5 – 5.0s ──
  .add(() => show('s2'), '-=0.05')
  .from('#s2a', { x: -400, opacity: 0, duration: 0.3, ease: 'power4.out' }, '<')
  .from('#s2b', { x: 400,  opacity: 0, duration: 0.3, ease: 'power4.out' }, '-=0.2')
  .to('#s2', { autoAlpha: 0, duration: 0.25 }, '+=1.8')

// ── S3: Roster  5.0 – 10.0s ──
  .add(() => show('s3'), '-=0.1')
  .from('#s3 .screen-frame', { y: 1920, duration: 0.55, ease: 'power3.out' }, '<')
  .to('#s3', { autoAlpha: 0, duration: 0.3 }, '+=4.0')

// ── S4: Type chips  10.0 – 14.5s ──
  .add(() => show('s4'), '-=0.15')
  .from('#c1,#c2,#c3,#c4,#c5,#c6,#c7,#c8', {
    scale: 0,
    opacity: 0,
    stagger: 0.15,
    duration: 0.25,
    ease: 'back.out(3.5)',
  }, '<')
  .to('#s4', { autoAlpha: 0, duration: 0.3 }, '+=1.5')

// ── S5: Profile + Red Flag sonar ping  14.5 – 19.5s ──
// Screen slides in, flag pops at t+1.2s, two sonar rings fire sequentially
  .add(() => show('s5'), '-=0.15')
  .from('#s5 .screen-frame', { scale: 1.08, opacity: 0, duration: 0.45, ease: 'power2.out' }, '<')
  // flag pop
  .to('#s5-flag', { opacity: 1, duration: 0.05 }, '<1.2')
  .from('#s5-flag', { scale: 2.2, duration: 0.35, ease: 'back.out(3)' }, '<')
  // ring 1: fires immediately after flag lands
  .fromTo('.s5-ring:nth-of-type(1)',
    { scale: 1, opacity: 0.8, transformOrigin: 'center center' },
    { scale: 2.8, opacity: 0, duration: 0.65, ease: 'power2.out' }, '<0.05')
  // ring 2: fires 150ms later for the double-ripple
  .fromTo('.s5-ring:nth-of-type(2)',
    { scale: 1, opacity: 0.55, transformOrigin: 'center center' },
    { scale: 3.4, opacity: 0, duration: 0.85, ease: 'power2.out' }, '<0.15')
  .to('#s5', { autoAlpha: 0, duration: 0.3 }, '+=3.8')

// ── S6: Insights + overlay text  18.5 – 23.5s ──
  .add(() => show('s6'), '-=0.15')
  .from('#s6 .screen-frame', { opacity: 0, duration: 0.5 }, '<')
  .from('#s6-text', { y: 80, opacity: 0, duration: 0.5, ease: 'power2.out' }, '<0.9')
  .to('#s6', { autoAlpha: 0, duration: 0.4 }, '+=3.8')

// ── S7: Lock-up  23.5 – 28.0s ──
  .add(() => show('s7'), '-=0.15')
  .from('#s7 .lockup-logo',    { scale: 0.75, opacity: 0, duration: 0.5, ease: 'back.out(2)' }, '<')
  .from('#s7 .lockup-tagline', { opacity: 0, y: 30,       duration: 0.35 }, '<0.2')
  .from('#s7 .lockup-pills',   { opacity: 0, y: 30,       duration: 0.35 }, '<0.15')
;

window.tl = tl;
window.timelineReady = true;

function scaleStage() {
  const stage = document.getElementById('stage');
  const s = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
  stage.style.transform = `scale(${s})`;
  stage.style.transformOrigin = 'center center';
}
window.addEventListener('load', scaleStage);
window.addEventListener('resize', scaleStage);
scaleStage();

// ── Preview controls (wired after DOM is ready) ──
const DURATION = 28;
window.addEventListener('load', () => {
const btn   = document.getElementById('pc-btn');
const scrub = document.getElementById('pc-scrub');
const timer = document.getElementById('pc-time');

let playing = false;
let raf;

function tick() {
  const t = tl.time();
  scrub.value = t;
  timer.textContent = t.toFixed(1) + 's';
  if (t < DURATION && playing) raf = requestAnimationFrame(tick);
  else { playing = false; btn.textContent = '▶ Play'; }
}

btn.addEventListener('click', () => {
  if (playing) {
    tl.pause(); playing = false; btn.textContent = '▶ Play';
    cancelAnimationFrame(raf);
  } else {
    if (tl.time() >= DURATION) tl.seek(0);
    tl.play(); playing = true; btn.textContent = '⏸ Pause';
    tick();
  }
});

scrub.addEventListener('input', () => {
  tl.seek(parseFloat(scrub.value), false);
  timer.textContent = parseFloat(scrub.value).toFixed(1) + 's';
});

if (!navigator.webdriver) {
  tl.play(); playing = true; btn.textContent = '⏸ Pause'; tick();
}
}); // end window.onload
</script>

  </div><!-- /stage -->
</div><!-- /stage-wrap -->

<!-- Controls rendered outside stage so they're always visible -->
<div id="preview-controls">
  <button id="pc-btn">▶ Play</button>
  <input id="pc-scrub" type="range" min="0" max="28" step="0.033" value="0">
  <span id="pc-time">0.0s</span>
</div>

</body>
</html>
