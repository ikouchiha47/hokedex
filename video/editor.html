<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>hokédex · Scene Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --surface: #161616; --border: #2a2a2a;
  --accent: #9d5cff; --text: #e0e0e0; --muted: #555; --danger: #ef4444;
  --sidebar-w: 240px; --props-w: 260px; --timeline-h: 80px;
}
body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 13px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Top bar ── */
#topbar { height: 44px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
#topbar h1 { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-right: auto; }
.btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-weight: 600; }
.btn:hover { background: #7c3aed; }
.btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn.ghost:hover { border-color: var(--accent); color: var(--accent); }

/* ── Main area ── */
#main { flex: 1; display: flex; overflow: hidden; }

/* ── Left sidebar ── */
#sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.sidebar-section { border-bottom: 1px solid var(--border); }
.sidebar-section h2 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); padding: 10px 14px 6px; }

/* Shapes */
#shape-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 8px 10px 10px; }
.shape-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--muted); font-size: 11px; transition: all 0.15s; }
.shape-btn:hover { border-color: var(--accent); color: var(--accent); }
.shape-btn.active { border-color: var(--accent); background: rgba(157,92,255,0.1); color: var(--accent); }
.shape-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }

/* Assets */
#asset-list { flex: 1; overflow-y: auto; padding: 6px 8px; display: flex; flex-direction: column; gap: 4px; }
.asset-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
.asset-item:hover { background: rgba(255,255,255,0.04); }
.asset-item.active { border-color: var(--accent); background: rgba(157,92,255,0.08); }
.asset-thumb { width: 32px; height: 32px; object-fit: cover; border-radius: 4px; background: var(--bg); flex-shrink: 0; }
.asset-name { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Canvas area ── */
#canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #080808; overflow: hidden; position: relative; }
#stage { position: relative; background: #111; overflow: hidden; cursor: crosshair; box-shadow: 0 0 60px rgba(0,0,0,0.8); }
#stage img { display: block; width: 100%; height: 100%; object-fit: cover; object-position: top center; pointer-events: none; user-select: none; }
#stage-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; }

/* Shapes on canvas */
.canvas-shape { position: absolute; cursor: pointer; box-sizing: border-box; }
.canvas-shape.selected { outline: 2px solid var(--accent); outline-offset: 2px; }
.canvas-shape .handle { position: absolute; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; cursor: nwse-resize; right: -4px; bottom: -4px; display: none; }
.canvas-shape.selected .handle { display: block; }

/* ── Right props panel ── */
#props { width: var(--props-w); background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
#props-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; padding: 20px; text-align: center; }
#props-form { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
.prop-group { display: flex; flex-direction: column; gap: 6px; }
.prop-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.prop-row { display: flex; gap: 6px; }
.prop-input { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 5px 8px; font-size: 12px; width: 100%; outline: none; }
.prop-input:focus { border-color: var(--accent); }
.prop-input[type=color] { padding: 2px 4px; height: 30px; cursor: pointer; }
.prop-select { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 5px 8px; font-size: 12px; width: 100%; outline: none; cursor: pointer; }
.prop-select:focus { border-color: var(--accent); }
.delete-btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); border-radius: 5px; padding: 6px; font-size: 12px; cursor: pointer; width: 100%; }
.delete-btn:hover { background: var(--danger); color: #fff; }

/* effect params */
#effect-params { display: flex; flex-direction: column; gap: 6px; }

/* ── Timeline ── */
#timeline-wrap { background: #111; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; height: 92px; }
#timeline-ruler { height: 20px; background: #0d0d0d; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; padding: 0 0 3px 0; overflow: hidden; position: relative; }
#timeline-ruler span { position: absolute; font-size: 9px; color: var(--muted); transform: translateX(-50%); }
#timeline-track { height: 52px; overflow-x: auto; overflow-y: hidden; position: relative; }
.scene-block { position: absolute; top: 6px; height: 40px; border-radius: 5px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; padding: 0 10px; overflow: hidden; border: 1px solid transparent; transition: filter 0.15s; min-width: 48px; }
.scene-block:hover { filter: brightness(1.2); }
.scene-block.active { border-color: #fff; box-shadow: 0 0 0 1px #fff; }
.scene-block-type { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; white-space: nowrap; }
.scene-block-src  { font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>

<div id="topbar">
  <h1>hokédex editor</h1>
  <button class="btn" onclick="saveToSpec()">Save to spec</button>
</div>

<div id="main">
  <!-- Left sidebar -->
  <div id="sidebar">
    <div class="sidebar-section">
      <h2>Shapes</h2>
      <div id="shape-grid">
        <div class="shape-btn" data-shape="circle" onclick="selectShapeTool(this)">
          <div class="shape-icon"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg></div>
          Circle
        </div>
        <div class="shape-btn" data-shape="ring" onclick="selectShapeTool(this)">
          <div class="shape-icon"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5" stroke-dasharray="3 2"/></svg></div>
          Ring
        </div>
        <div class="shape-btn" data-shape="pill" onclick="selectShapeTool(this)">
          <div class="shape-icon"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="10" rx="5"/></svg></div>
          Pill
        </div>
        <div class="shape-btn" data-shape="rect" onclick="selectShapeTool(this)">
          <div class="shape-icon"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/></svg></div>
          Rect
        </div>
      </div>
    </div>
    <div class="sidebar-section" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <h2>Assets</h2>
      <div id="asset-list"></div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <div id="stage">
      <div id="stage-placeholder">Select a scene from the timeline</div>
    </div>
  </div>

  <!-- Props -->
  <div id="props">
    <div id="props-empty">Select a shape<br>to edit properties</div>
    <div id="props-form" style="display:none"></div>
  </div>
</div>

<!-- Timeline -->
<div id="timeline-wrap">
  <div id="timeline-ruler"></div>
  <div id="timeline-track"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
const STAGE_W = 1080, STAGE_H = 1920;
let scenes      = [];
let assets      = [];
let shapes      = [];   // { id, type, x, y, w, h, color, effect, effectParams, at, label, emoji }
let selectedId  = null;
let activeShape = null; // currently selected tool
let activeScene = null;
let stageScale  = 1;
let nextId      = 1;
let dragging    = null; // { shapeId, startMouseX, startMouseY, startX, startY }
let resizing    = null;

const EFFECTS = ['none','pop-in','bloom','tap-ring'];
const EFFECT_PARAMS = {
  'bloom':    [{ key:'color', label:'Color', type:'color', default:'#9d5cff' }, { key:'delay', label:'Delay (s)', type:'number', default:0.2 }, { key:'duration', label:'Duration (s)', type:'number', default:0.8 }],
  'tap-ring': [{ key:'count', label:'Taps', type:'number', default:5 }, { key:'stagger', label:'Stagger (s)', type:'number', default:0.4 }, { key:'color', label:'Color', type:'color', default:'#9d5cff' }],
  'pop-in':   [],
  'none':     [],
};

// ── Boot ───────────────────────────────────────────────────────────────────────
async function boot() {
  const [a, s] = await Promise.all([
    fetch('/api/assets').then(r => r.json()).catch(() => []),
    fetch('/api/scenes').then(r => r.json()).catch(() => []),
  ]);
  assets = a;
  scenes = s;
  renderAssets();
  renderTimeline();
  sizeStage();
  window.addEventListener('resize', sizeStage);
}

function sizeStage() {
  const wrap  = document.getElementById('canvas-wrap');
  const stage = document.getElementById('stage');
  const maxH  = wrap.clientHeight - 32;
  const maxW  = wrap.clientWidth  - 32;
  stageScale  = Math.min(maxW / STAGE_W, maxH / STAGE_H);
  stage.style.width  = (STAGE_W * stageScale) + 'px';
  stage.style.height = (STAGE_H * stageScale) + 'px';
  renderShapes();
}

// ── Assets ─────────────────────────────────────────────────────────────────────
function renderAssets() {
  const list = document.getElementById('asset-list');
  list.innerHTML = '';
  assets.forEach(name => {
    const el = document.createElement('div');
    el.className = 'asset-item';
    el.innerHTML = `<img class="asset-thumb" src="/public/${name}"><span class="asset-name">${name}</span>`;
    el.onclick = () => loadAsset(name, el);
    list.appendChild(el);
  });
}

function loadAsset(name, el) {
  document.querySelectorAll('.asset-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  const stage = document.getElementById('stage');
  stage.innerHTML = `<img src="/public/${name}" id="stage-img" draggable="false">`;
  const img = stage.querySelector('img');
  img.style.cssText = `display:block;width:100%;height:100%;object-fit:cover;object-position:top center;pointer-events:none;user-select:none;`;
  stage.addEventListener('mousedown', onStageMouseDown);
  renderShapes();
}

// ── Timeline ───────────────────────────────────────────────────────────────────
const SCENE_COLORS = { text: '#3b5bdb', screenshot: '#7950f2', chips: '#e64980', slideshow: '#0ca678', lockup: '#f76707' };
const PX_PER_SEC = 80;

function renderTimeline() {
  const track = document.getElementById('timeline-track');
  const ruler  = document.getElementById('timeline-ruler');
  track.innerHTML = '';
  ruler.innerHTML = '';

  const totalDur = scenes.reduce((s, sc) => s + (sc.duration || 0), 0);
  const totalPx  = Math.max(totalDur * PX_PER_SEC, track.clientWidth || 800);

  // Ruler tick marks every 1s
  for (let t = 0; t <= Math.ceil(totalDur); t++) {
    const tick = document.createElement('span');
    tick.textContent = t + 's';
    tick.style.left = (t * PX_PER_SEC) + 'px';
    ruler.appendChild(tick);
  }

  let cursor = 0;
  scenes.forEach((sc, i) => {
    const dur   = sc.duration || 1;
    const w     = Math.round(dur * PX_PER_SEC);
    const left  = Math.round(cursor * PX_PER_SEC);
    const color = SCENE_COLORS[sc.type] || '#444';
    const label = sc.src || (sc.images && sc.images[0]) || (sc.images && sc.images[0]) || '';

    const block = document.createElement('div');
    block.className = 'scene-block';
    block.dataset.index = i;
    block.style.left   = left + 'px';
    block.style.width  = (w - 2) + 'px';
    block.style.background  = color + '2a';
    block.style.borderColor = color;
    block.innerHTML = `
      <div class="scene-block-type" style="color:${color}">${sc.type}</div>
      <div class="scene-block-src">${label || dur + 's'}</div>
    `;
    block.onclick = () => selectScene(i, block);
    track.appendChild(block);
    cursor += dur;
  });

  // set track scroll width
  track.style.minWidth = Math.round(cursor * PX_PER_SEC + 40) + 'px';
}

function selectScene(i, block) {
  document.querySelectorAll('.scene-block').forEach(b => b.classList.remove('active'));
  block.classList.add('active');
  activeScene = scenes[i];
  const img = activeScene.src || (activeScene.images && activeScene.images[0]);
  if (img) {
    const assetEl = [...document.querySelectorAll('.asset-item')].find(el => el.querySelector('.asset-name').textContent === img);
    if (assetEl) loadAsset(img, assetEl);
  }
}

// ── Shape tool ────────────────────────────────────────────────────────────────
function selectShapeTool(btn) {
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
  if (activeShape === btn.dataset.shape) { activeShape = null; return; }
  btn.classList.add('active');
  activeShape = btn.dataset.shape;
}

// ── Draw-drag state ───────────────────────────────────────────────────────────
let drawing = null; // { startX, startY, ghostEl }

function onStageMouseDown(e) {
  if (!activeShape) return;
  if (e.target.closest('.canvas-shape')) return;
  e.preventDefault();
  const stage = document.getElementById('stage');
  const rect  = stage.getBoundingClientRect();
  const x0 = e.clientX - rect.left;
  const y0 = e.clientY - rect.top;

  const ghost = document.createElement('div');
  ghost.id = 'draw-ghost';
  ghost.style.cssText = `position:absolute;pointer-events:none;box-sizing:border-box;opacity:0.6;`;
  applyShapeStyle(ghost, activeShape, '#9d5cff', 0, 0);
  ghost.style.left = x0 + 'px';
  ghost.style.top  = y0 + 'px';
  ghost.style.width  = '0px';
  ghost.style.height = '0px';
  stage.appendChild(ghost);

  drawing = { x0, y0, ghost };
  window.addEventListener('mousemove', onDrawMove);
  window.addEventListener('mouseup',   onDrawEnd);
}

function onDrawMove(e) {
  if (!drawing) return;
  const stage = document.getElementById('stage');
  const rect  = stage.getBoundingClientRect();
  const x1 = e.clientX - rect.left;
  const y1 = e.clientY - rect.top;
  const left = Math.min(drawing.x0, x1);
  const top  = Math.min(drawing.y0, y1);
  const w    = Math.abs(x1 - drawing.x0);
  const h    = activeShape === 'circle' || activeShape === 'ring' ? w : Math.abs(y1 - drawing.y0);
  drawing.ghost.style.left   = left + 'px';
  drawing.ghost.style.top    = top  + 'px';
  drawing.ghost.style.width  = w    + 'px';
  drawing.ghost.style.height = h    + 'px';
}

function onDrawEnd(e) {
  if (!drawing) return;
  window.removeEventListener('mousemove', onDrawMove);
  window.removeEventListener('mouseup',   onDrawEnd);
  const stage = document.getElementById('stage');
  const rect  = stage.getBoundingClientRect();
  const x1 = e.clientX - rect.left;
  const y1 = e.clientY - rect.top;
  const left = Math.min(drawing.x0, x1);
  const top  = Math.min(drawing.y0, y1);
  const wPx  = Math.abs(x1 - drawing.x0);
  const hPx  = activeShape === 'circle' || activeShape === 'ring' ? wPx : Math.abs(y1 - drawing.y0);
  drawing.ghost.remove();
  drawing = null;

  if (wPx < 8) return; // accidental click

  const shape = {
    id: nextId++,
    type: activeShape,
    x: Math.round((left + wPx / 2) / stageScale),
    y: Math.round((top  + hPx / 2) / stageScale),
    w: Math.round(wPx / stageScale),
    h: Math.round(hPx / stageScale),
    color: '#9d5cff',
    effect: 'none',
    effectParams: {},
    at: 0.5,
    label: '',
    emoji: '',
  };
  shapes.push(shape);
  renderShapes();
  selectShape(shape.id);
}

function applyShapeStyle(el, type, color, w, h) {
  if (type === 'circle') {
    el.style.borderRadius = '50%';
    el.style.background   = color + '44';
    el.style.border       = `2px solid ${color}`;
  } else if (type === 'ring') {
    el.style.borderRadius = '50%';
    el.style.background   = 'transparent';
    el.style.border       = `3px solid ${color}`;
  } else if (type === 'pill') {
    el.style.borderRadius = '100px';
    el.style.background   = color + '18';
    el.style.border       = `2px solid ${color}`;
  } else {
    el.style.borderRadius = '6px';
    el.style.background   = color + '18';
    el.style.border       = `2px solid ${color}`;
  }
}

function onStageClick(e) { /* replaced by mousedown draw */ }

// ── Render shapes on canvas ───────────────────────────────────────────────────
function renderShapes() {
  const stage = document.getElementById('stage');
  stage.querySelectorAll('.canvas-shape').forEach(el => el.remove());

  shapes.forEach(sh => {
    const el = document.createElement('div');
    el.className = 'canvas-shape' + (sh.id === selectedId ? ' selected' : '');
    el.dataset.id = sh.id;

    const px = sh.x * stageScale;
    const py = sh.y * stageScale;
    const pw = sh.w * stageScale;
    const ph = sh.h * stageScale;

    el.style.cssText = `left:${px - pw/2}px;top:${py - ph/2}px;width:${pw}px;height:${ph}px;`;

    // Shape visual
    const inner = document.createElement('div');
    inner.style.cssText = `width:100%;height:100%;box-sizing:border-box;`;
    applyShapeStyle(inner, sh.type, sh.color, pw, ph);
    if (sh.type === 'pill' && (sh.label || sh.emoji)) {
      inner.style.display = 'flex';
      inner.style.alignItems = 'center';
      inner.style.justifyContent = 'center';
      inner.style.color = sh.color;
      inner.style.fontSize = Math.round(ph * 0.35) + 'px';
      inner.style.fontWeight = '700';
      inner.style.fontFamily = 'Space Grotesk, sans-serif';
      inner.style.whiteSpace = 'nowrap';
      inner.textContent = (sh.emoji ? sh.emoji + ' ' : '') + sh.label;
    }
    el.appendChild(inner);

    // resize handle
    const handle = document.createElement('div');
    handle.className = 'handle';
    handle.addEventListener('mousedown', e => startResize(e, sh.id));
    el.appendChild(handle);

    el.addEventListener('mousedown', e => { if (!e.target.classList.contains('handle')) startDrag(e, sh.id); });
    el.addEventListener('click', e => { e.stopPropagation(); selectShape(sh.id); });
    stage.appendChild(el);
  });
}

// ── Drag & resize ─────────────────────────────────────────────────────────────
function startDrag(e, id) {
  e.preventDefault();
  const sh = shapes.find(s => s.id === id);
  dragging = { id, startMouseX: e.clientX, startMouseY: e.clientY, startX: sh.x, startY: sh.y };
  window.addEventListener('mousemove', onDragMove);
  window.addEventListener('mouseup', stopDrag);
}
function onDragMove(e) {
  if (!dragging) return;
  const sh = shapes.find(s => s.id === dragging.id);
  sh.x = dragging.startX + Math.round((e.clientX - dragging.startMouseX) / stageScale);
  sh.y = dragging.startY + Math.round((e.clientY - dragging.startMouseY) / stageScale);
  renderShapes(); renderProps();
}
function stopDrag() { dragging = null; window.removeEventListener('mousemove', onDragMove); window.removeEventListener('mouseup', stopDrag); }

function startResize(e, id) {
  e.preventDefault(); e.stopPropagation();
  const sh = shapes.find(s => s.id === id);
  resizing = { id, startMouseX: e.clientX, startMouseY: e.clientY, startW: sh.w, startH: sh.h };
  window.addEventListener('mousemove', onResizeMove);
  window.addEventListener('mouseup', stopResize);
}
function onResizeMove(e) {
  if (!resizing) return;
  const sh = shapes.find(s => s.id === resizing.id);
  sh.w = Math.max(20, resizing.startW + Math.round((e.clientX - resizing.startMouseX) / stageScale));
  sh.h = Math.max(20, resizing.startH + Math.round((e.clientY - resizing.startMouseY) / stageScale));
  renderShapes(); renderProps();
}
function stopResize() { resizing = null; window.removeEventListener('mousemove', onResizeMove); window.removeEventListener('mouseup', stopResize); }

// ── Props panel ───────────────────────────────────────────────────────────────
function selectShape(id) {
  selectedId = id;
  renderShapes();
  renderProps();
}

function renderProps() {
  const sh = shapes.find(s => s.id === selectedId);
  document.getElementById('props-empty').style.display = sh ? 'none' : 'flex';
  const form = document.getElementById('props-form');
  form.style.display = sh ? 'flex' : 'none';
  if (!sh) return;

  form.innerHTML = `
    <div class="prop-group">
      <div class="prop-label">Position &amp; Size</div>
      <div class="prop-row">
        <input class="prop-input" type="number" placeholder="x" value="${sh.x}" onchange="updateShape(${sh.id},'x',+this.value)">
        <input class="prop-input" type="number" placeholder="y" value="${sh.y}" onchange="updateShape(${sh.id},'y',+this.value)">
      </div>
      <div class="prop-row">
        <input class="prop-input" type="number" placeholder="w" value="${sh.w}" onchange="updateShape(${sh.id},'w',+this.value)">
        <input class="prop-input" type="number" placeholder="h" value="${sh.h}" onchange="updateShape(${sh.id},'h',+this.value)">
      </div>
    </div>
    <div class="prop-group">
      <div class="prop-label">Appears at (seconds)</div>
      <input class="prop-input" type="number" step="0.1" value="${sh.at}" onchange="updateShape(${sh.id},'at',+this.value)">
    </div>
    <div class="prop-group">
      <div class="prop-label">Color</div>
      <input class="prop-input" type="color" value="${sh.color}" oninput="updateShape(${sh.id},'color',this.value)">
    </div>
    ${sh.type === 'pill' ? `
    <div class="prop-group">
      <div class="prop-label">Label</div>
      <div class="prop-row">
        <input class="prop-input" placeholder="emoji" value="${sh.emoji}" style="width:60px" onchange="updateShape(${sh.id},'emoji',this.value)">
        <input class="prop-input" placeholder="label" value="${sh.label}" onchange="updateShape(${sh.id},'label',this.value)">
      </div>
    </div>` : ''}
    <div class="prop-group">
      <div class="prop-label">Effect</div>
      <select class="prop-select" onchange="updateShape(${sh.id},'effect',this.value)">
        ${EFFECTS.map(e => `<option value="${e}" ${sh.effect===e?'selected':''}>${e}</option>`).join('')}
      </select>
    </div>
    <div class="prop-group" id="effect-params">
      ${renderEffectParams(sh)}
    </div>
    <button class="delete-btn" onclick="deleteShape(${sh.id})">Delete shape</button>
  `;
}

function renderEffectParams(sh) {
  const params = EFFECT_PARAMS[sh.effect] || [];
  if (!params.length) return '';
  return `<div class="prop-label">Effect params</div>` + params.map(p => `
    <div class="prop-row" style="align-items:center;gap:8px;">
      <span style="color:var(--muted);font-size:11px;min-width:70px">${p.label}</span>
      <input class="prop-input" type="${p.type}" value="${sh.effectParams[p.key] ?? p.default}"
        ${p.type==='number'?'step="0.1"':''}
        oninput="updateEffectParam(${sh.id},'${p.key}',${p.type==='color'?"this.value":"parseFloat(this.value)||this.value"})">
    </div>
  `).join('');
}

function updateShape(id, key, val) {
  const sh = shapes.find(s => s.id === id);
  if (!sh) return;
  sh[key] = val;
  if (key === 'effect') { sh.effectParams = {}; }
  renderShapes(); renderProps();
}
function updateEffectParam(id, key, val) {
  const sh = shapes.find(s => s.id === id);
  if (!sh) return;
  sh.effectParams[key] = val;
}
function deleteShape(id) {
  shapes = shapes.filter(s => s.id !== id);
  selectedId = null;
  renderShapes(); renderProps();
}

// ── Output ────────────────────────────────────────────────────────────────────
function shapeToElementObj(sh) {
  const effects = sh.effect === 'none' ? [] : [buildEffectObj(sh)];
  let element, data;
  if (sh.type === 'pill')        { element = 'core:pill';   data = { label: sh.label || '', emoji: sh.emoji || '', color: sh.color }; }
  else if (sh.type === 'circle') { element = 'core:circle'; data = { color: sh.color }; }
  else if (sh.type === 'ring')   { element = 'core:ring';   data = { color: sh.color }; }
  else                           { element = 'core:circle'; data = { color: sh.color }; }
  return { id: `${sh.type}-${sh.id}`, element, x: sh.x, y: sh.y, w: sh.w, h: sh.h, at: sh.at, data, effects };
}

function buildEffectObj(sh) {
  const p = sh.effectParams;
  switch(sh.effect) {
    case 'pop-in':   return { type: 'pop-in' };
    case 'bloom':    return { type: 'bloom',    color: p.color||sh.color, delay: p.delay??0.2, duration: p.duration??0.8 };
    case 'tap-ring': return { type: 'tap-ring', count: p.count??5, stagger: p.stagger??0.4, color: p.color||sh.color };
    default: return {};
  }
}

// keep string versions for clipboard copy
function shapeToElement(sh) { return JSON.stringify(shapeToElementObj(sh), null, 2); }
function buildEffect(sh)     { return JSON.stringify(buildEffectObj(sh)); }

async function saveToSpec() {
  if (activeScene === null) return;
  const sceneIndex = scenes.indexOf(activeScene);
  if (sceneIndex < 0) return;
  const elements = shapes.map(shapeToElementObj);
  const res = await fetch('/api/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sceneIndex, elements }),
  });
  const btn = document.querySelector('.btn');
  if (res.ok) { btn.textContent = 'Saved!'; setTimeout(() => btn.textContent = 'Save to spec', 1500); }
  else        { btn.textContent = 'Error!';  setTimeout(() => btn.textContent = 'Save to spec', 1500); }
}

function buildEffect(sh) {
  const p = sh.effectParams;
  switch(sh.effect) {
    case 'pop-in':   return `{ type: 'pop-in' }`;
    case 'bloom':    return `{ type: 'bloom', color: '${p.color||sh.color}', delay: ${p.delay??0.2}, duration: ${p.duration??0.8} }`;
    case 'tap-ring': return `{ type: 'tap-ring', count: ${p.count??5}, stagger: ${p.stagger??0.4}, color: '${p.color||sh.color}' }`;
    default: return '';
  }
}

function copyElements() {
  const out = `elements: [\n${shapes.map(s => '  ' + shapeToElement(s)).join(',\n')}\n]`;
  copy(out);
}

function copy(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Backspace' && selectedId && !e.target.matches('input,select,textarea')) {
    deleteShape(selectedId);
  }
  if (e.key === 'Escape') { selectedId = null; renderShapes(); renderProps(); }
});

boot();
</script>
</body>
</html>
